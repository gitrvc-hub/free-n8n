name: Deploy
on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
            ghcr.io/${{ github.repository }}/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v6
        with:
          context: ./watchdog
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/watchdog:${{ github.sha }}
            ghcr.io/${{ github.repository }}/watchdog:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-push
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          export GIT_SHA
          docker compose pull sveltekit-app watchdog
          docker compose up -d --no-deps sveltekit-app watchdog
