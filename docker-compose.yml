services:
  traefik:
    image: traefik:v3.3
    ports:
      - '10.0.0.229:80:80'
      - '10.0.0.229:443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/letsencrypt
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certresolver=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    networks:
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  sveltekit-app:
    image: ghcr.io/gitrvc-hub/free-n8n/app:${GIT_SHA:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: 'true'
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DB_URL: ${N8N_DB_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      E2_ENDPOINT: ${E2_ENDPOINT}
      E2_ACCESS_KEY_ID: ${E2_ACCESS_KEY_ID}
      E2_SECRET_ACCESS_KEY: ${E2_SECRET_ACCESS_KEY}
      E2_BUCKET: ${E2_BUCKET}
      E2_REGION: ${E2_REGION}
      PUBLIC_APP_URL: https://n8n.e4dev.com
    labels:
      - traefik.enable=true
      - traefik.http.routers.sveltekit.rule=Host(`n8n.e4dev.com`) && !PathPrefix(`/n8n`)
      - traefik.http.routers.sveltekit.entrypoints=websecure
      - traefik.http.routers.sveltekit.tls.certresolver=cloudflare
      - traefik.http.routers.sveltekit.middlewares=security-headers@file,rate-limit@file
      - traefik.http.services.sveltekit.loadbalancer.server.port=3000
    networks:
      - proxy
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  n8n:
    image: docker.n8n.io/n8nio/n8n
    expose:
      - '5678'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_HOST: n8n.e4dev.com
      N8N_PATH: /n8n/
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: 'true'
      N8N_RUNNERS_ENABLED: 'true'
      EXECUTIONS_TIMEOUT: 60
      EXECUTIONS_TIMEOUT_MAX: 60
      N8N_CONCURRENCY_PRODUCTION_LIMIT: 20
      N8N_USER_MANAGEMENT_DISABLED: 'false'
      GENERIC_TIMEZONE: UTC
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`n8n.e4dev.com`) && PathPrefix(`/n8n`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.tls.certresolver=cloudflare
      - traefik.http.routers.n8n.middlewares=n8n-strip-prefix,security-headers@file,rate-limit@file
      - traefik.http.middlewares.n8n-strip-prefix.stripprefix.prefixes=/n8n
      - traefik.http.services.n8n.loadbalancer.server.port=5678
    networks:
      - proxy
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  n8n-worker:
    image: docker.n8n.io/n8nio/n8n
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      DB_POSTGRESDB_SCHEMA: public
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: UTC
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  watchdog:
    image: ghcr.io/gitrvc-hub/free-n8n/watchdog:${GIT_SHA:-latest}
    build:
      context: ./watchdog
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      N8N_DB_URL: ${N8N_DB_URL}
      N8N_API_URL: http://n8n:5678
      N8N_API_KEY: ${N8N_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://n8n.e4dev.com}
      E2_ENDPOINT: ${E2_ENDPOINT}
      E2_ACCESS_KEY_ID: ${E2_ACCESS_KEY_ID}
      E2_SECRET_ACCESS_KEY: ${E2_SECRET_ACCESS_KEY}
      E2_BUCKET: ${E2_BUCKET}
      E2_REGION: ${E2_REGION}
      INACTIVITY_DAYS: ${INACTIVITY_DAYS:-7}
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  proxy:
    external: false
  internal:
    external: false

volumes:
  traefik_certs:
  n8n_data:
  postgres_data:
  redis_data:
